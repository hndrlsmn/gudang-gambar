<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudang Gambar Otomatis</title>
    <style>
        :root { --gold: #b8860b; --dark: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 2px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 5%;
        }
        
        .img-card {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }
        
        .img-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        .img-card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        
        .img-info { padding: 15px; text-align: center; font-size: 13px; color: #888; }
        
        .loading { text-align: center; font-size: 1.2rem; color: var(--gold); padding: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 GUDANG KOLEKSI GAMBAR</h1>
        <p>Cukup upload ke folder "koleksi", gambar muncul otomatis di sini.</p>
    </div>

    <div id="loading" class="loading">Menghubungkan ke database GitHub...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        // --- KONFIGURASI KETUA ---
        const username = "hndrlsmn"; // Ganti dengan username GitHub Ketua
        const repo = "gudang-gambar";        // Ganti dengan nama repository
        const folder = "koleksi";           // Nama folder tempat simpan foto

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');
            
            try {
                // Mengambil daftar file dari GitHub API
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                const files = await response.json();
                
                loading.style.display = 'none';
                
                files.forEach(file => {
                    // Hanya ambil file gambar
                    if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        const card = `
                            <div class="img-card">
                                <a href="${file.download_url}" target="_blank">
                                    <img src="${file.download_url}" alt="${file.name}">
                                </a>
                                <div class="img-info">
                                    ${file.name}<br>
                                    <small>Terdeteksi Otomatis</small>
                                </div>
                            </div>
                        `;
                        gallery.innerHTML += card;
                    }
                });
            } catch (error) {
                loading.innerHTML = "Gagal memuat gambar. Pastikan username dan nama repo benar.";
                console.error(error);
            }
        }

        loadImages();
    </script>
</body>
</html>
